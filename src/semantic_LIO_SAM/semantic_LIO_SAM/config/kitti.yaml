common:
    lid_topic:  "/velodyne_points"
    imu_topic:  "/imu/data"
    time_sync_en: false         # rosbag replay should keep this false
    time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                  # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

preprocess:
    lidar_type: 2                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 
    scan_line: 32
    scan_rate: 10                # only need to be set for velodyne, unit: Hz,
    timestamp_unit: 2            # the unit of time/t field in the PointCloud2 rostopic: 0-second, 1-milisecond, 2-microsecond, 3-nanosecond.
    blind: 2

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree:    180
    det_range:     100.0
    extrinsic_est_en:  false      # true: enable the online estimation of IMU-LiDAR extrinsic,
    extrinsic_T: [ 8.10543972e-01, -3.07054372e-01, 8.02723995e-01 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1 ]

publish:
    path_en:  false
    scan_publish_en:  true       # false: close all the point cloud output
    dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame
    semantic_color_cloud_en: true # true: publish semantic colorized cloud in RViz instead of raw intensity cloud

pcd_save:
    pcd_save_en: true
    interval: -1                 # how many LiDAR frames saved in each pcd file; 
                                 # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.
                                 
                                 
# voxel filter paprams
odometrySurfLeafSize: 0.2                     # default: 0.4 - outdoor, 0.2 - indoor
mappingCornerLeafSize: 0.1                    # default: 0.2 - outdoor, 0.1 - indoor
mappingSurfLeafSize: 0.2                      # default: 0.4 - outdoor, 0.2 - indoor

# robot motion constraint (in case you are using a 2D robot)
z_tollerance: 1000                            # meters
rotation_tollerance: 1000                     # radians

# CPU Params
numberOfCores: 4                              # number of cores for mapping optimization
mappingProcessInterval: 0.15                  # seconds, regulate mapping frequency

# Surrounding map
surroundingkeyframeAddingDistThreshold: 1.0   # meters, regulate keyframe adding threshold	选取关键帧的距离阈值
surroundingkeyframeAddingAngleThreshold: 0.2  # radians, regulate keyframe adding threshold	角度阈值
surroundingKeyframeDensity: 2.0               # meters, downsample surrounding keyframe poses   no_used
surroundingKeyframeSearchRadius: 50.0         # meters, within n meters scan-to-map optimization (when loop closure disabled) no_used

# Loop closure
loopClosureEnableFlag: true
loopClosureFrequency: 4.0                     # Hz, regulate loop closure constraint add frequency
surroundingKeyframeSize: 50                   # submap size (when loop closure enabled)
historyKeyframeSearchRadius: 3.0            # meters, key frame that is within n meters from current pose will be considerd for loop closure
historyKeyframeSearchTimeDiff: 30.0           # seconds, key frame that is n seconds older will be considered for loop closure
historyKeyframeSearchNum: 20                  # number of hostory key frames will be fused into a submap for loop closure
historyKeyframeFitnessScore: 0.3              # icp threshold, the smaller the better alignment

# GPS Settings
useImuHeadingInitialization: false           # if using GPS data, set to "true"
useGpsElevation: false                      # if GPS elevation is bad, set to "false"
gpsCovThreshold: 2.0                        # m^2, threshold for using GPS data
poseCovThreshold: 0 #25.0                      # m^2, threshold for using GPS data  位姿协方差阈值 from isam2


# Visualization
globalMapVisualizationSearchRadius: 100.0    # meters, global map visualization radius,  iktree submap 的搜索范围
globalMapVisualizationPoseDensity: 10      # meters, global map visualization keyframe density
globalMapVisualizationLeafSize: 1.0           # meters, global map visualization cloud density

# visual iktree_map  
visulize_IkdtreeMap: true

# visual iktree_map  
recontructKdTree: true

# Export settings
savePCD: true                         # https://github.com/TixiaoShan/LIO-SAM/issues/3
savePCDDirectory: "/home/pan/semantic-lio-sam/PCD/"        # in your home folder, starts and ends with "/". Warning: the code deletes "LOAM" folder then recreates it. See "mapOptimization" for implementation

semantic:
  label_folder: "/home/pan/SemanticKITTI/00/labels/"  # 语义标签路径（按rosbag雷达话题点序逐点绑定到xyzl）
  label_index_offset: 0                    # label frame index offset (use +/- when bag start frame differs)
  semantic_weight: 0.5                       # 语义权重（0.0-1.0）
  use_semantic_frontend: true               # 前端scan-to-map启用语义一致性加权
  frontend_semantic_weight: 0.3             # 前端语义权重[0,1]，越大越强调语义一致点
  use_semantic_icp: false                    # 先关闭语义ICP，主流程跑通后再开启
  loop_semantic_fusion_enable: false         # 先关闭回环语义融合，主流程跑通后再开启
  factor_graph_semantic_weighting_enable: true # 在因子图优化中对里程计/回环因子做语义加权
  factor_graph_semantic_on_odom: true          # 语义权重作用于里程计因子
  factor_graph_semantic_on_loop: true          # 语义权重作用于回环因子
  factor_graph_semantic_weight: 0.5            # [0,1]，越大越依赖语义相似度
  factor_graph_semantic_min_variance_scale: 0.5 # 语义高一致时最小方差缩放（更信任该因子）
  factor_graph_semantic_max_variance_scale: 2.0 # 语义低一致时最大方差缩放（降低该因子权重）
